name: Build QMK Firmware (9key_makro_master)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "config.h"
      - "keyboard.json"
      - "README.md"
      - "9key_makro_master.c"
      - "9key_makro_master.h"
      - "rules.mk"
      - "keymaps/**"
      - ".github/workflows/build.yaml"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK firmware tree
        run: |
          rm -rf ~/qmk_firmware
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git ~/qmk_firmware
          qmk config user.qmk_home=~/qmk_firmware

      - name: Copy keyboard into QMK tree
        run: |
          mkdir -p ~/qmk_firmware/keyboards/9key_makro_master
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            "$GITHUB_WORKSPACE/" \
            ~/qmk_firmware/keyboards/9key_makro_master/

      - name: Install ARM GCC toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Pull submodules
        run: cd ~/qmk_firmware && git submodule update --init --recursive

      - name: Compile VIA firmware
        run: |
          cd ~/qmk_firmware
          qmk compile -j 1 -kb 9key_makro_master -km via

      - name: Collect UF2 artifact
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          UF2_FILE=$(find "$HOME/qmk_firmware" -type f -name '9key_makro_master_via.uf2' | head -n 1)
          if [ -z "$UF2_FILE" ]; then
            echo "Expected firmware 9key_makro_master_via.uf2 was not produced."
            exit 1
          fi
          cp "$UF2_FILE" "$GITHUB_WORKSPACE/artifacts/"

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: 9key_makro_master_via_firmware
          path: artifacts/9key_makro_master_via.uf2
          if-no-files-found: error
