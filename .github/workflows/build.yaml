name: Build 9key_makro_master

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "config.h"
      - "keyboard.json"
      - "README.md"
      - "9key_makro_master.c"
      - "9key_makro_master.h"
      - "rules.mk"
      - "keymaps/**"
      - ".github/workflows/build.yaml"
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      KEYBOARD: 9key_makro_master
      KEYMAP: via
      QMK_HOME: ${{ github.workspace }}/qmk_firmware

    steps:
      - name: Checkout keyboard repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi dfu-util git rsync unzip zip

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Initialize QMK
        run: |
          qmk setup -H "$QMK_HOME" -y
          qmk config user.qmk_home="$QMK_HOME"

      - name: Inject keyboard sources
        run: |
          mkdir -p "$QMK_HOME/keyboards/$KEYBOARD"
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            "$GITHUB_WORKSPACE/" \
            "$QMK_HOME/keyboards/$KEYBOARD/"

      - name: Check QMK environment
        run: |
          qmk doctor

      - name: Build firmware
        run: |
          qmk compile -kb "$KEYBOARD" -km "$KEYMAP"

      - name: Stage artifact
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          find "$QMK_HOME" -type f -name "${KEYBOARD}_${KEYMAP}.uf2" -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;
          test -f "$GITHUB_WORKSPACE/artifacts/${KEYBOARD}_${KEYMAP}.uf2"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 9key_makro_master_via_uf2
          path: artifacts/9key_makro_master_via.uf2
          if-no-files-found: error
